<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Actions">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Actions</title>
<style>
:root {
  --bg:        #0d0d0d;
  --surface:   #161616;
  --border:    #222;
  --muted:     #3a3a3a;
  --text:      #e8e8e8;
  --dim:       #555;
  --dim2:      #888;
  --critical:  #ff3b3b;
  --high:      #ff8c00;
  --medium:    #f5c400;
  --low:       #4a9eff;
  --done:      #2ecc71;
  --wip:       #7c5cfc;
  --mono:      'SF Mono','Fira Code','Cascadia Code',monospace;
  --ui:        -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:         8px;
  --sb:        env(safe-area-inset-bottom,0px);
  --st:        env(safe-area-inset-top,0px);
  --roobet:    #e84393;
  --lsports:   #00c896;
  --openbet:   #a78bfa;
  --internal:  #fb923c;
  --self:      #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── Token ── */
#token-overlay{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
#token-overlay.hidden{display:none}
.token-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px}
.token-card h1{font-size:18px;font-weight:600;margin-bottom:6px}
.token-card p{font-size:13px;color:var(--dim2);margin-bottom:20px;line-height:1.5}
.token-card input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 12px;margin-bottom:12px;outline:none}
.token-card input:focus{border-color:var(--low)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:var(--r);border:none;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-primary{background:var(--low);color:#000;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim2);font-size:13px}
.btn-danger{background:transparent;border:1px solid var(--critical);color:var(--critical);font-size:13px}
.btn-sm{padding:6px 11px;font-size:12px}

/* ── App shell — full height flex column ── */
#app{display:none;flex-direction:column;height:100dvh;overflow:hidden}
#app.visible{display:flex}

/* ── Top bar ── */
.top-bar{flex-shrink:0;display:flex;align-items:center;padding:calc(10px + var(--st)) 16px 6px;gap:8px;background:var(--bg)}
.top-title{font-size:16px;font-weight:700;flex:1}
.icon-btn{background:none;border:none;color:var(--dim2);font-size:18px;cursor:pointer;padding:6px;-webkit-tap-highlight-color:transparent}
.icon-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Main tabs ── */
.main-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);padding:0 16px}
.main-tab{padding:9px 16px;font-size:14px;font-weight:600;color:var(--dim2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.main-tab.active{color:var(--text);border-bottom-color:var(--low)}

/* ── Tab panels ── */
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--sb))}
.tab-panel.active{display:block}

/* ── Dashboard header ── */
.dash-header{padding:14px 16px 10px}
.greeting{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.greeting-date{font-size:12px;color:var(--dim2)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);margin-bottom:6px;font-family:var(--mono)}
.stat-val{font-size:28px;font-weight:700;line-height:1;margin-bottom:3px;font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--dim2)}
.v-ok  {color:var(--done)}
.v-crit{color:var(--critical)}
.v-def {color:var(--text)}
.stat-accent{width:22px;height:2px;border-radius:1px;margin-bottom:6px}

/* ── Sub-tabs ── */
.sub-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);padding:0 16px}
.sub-tab{padding:8px 12px;font-size:11px;font-weight:700;color:var(--dim2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
.sub-tab.active{color:var(--text);border-bottom-color:var(--dim2)}



/* ── Task list ── */
.task-list{padding:4px 0}
.day-group{}
.day-hdr{padding:10px 16px 3px;display:flex;align-items:baseline;gap:7px}
.day-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);font-family:var(--mono)}
.day-lbl.overdue{color:var(--critical)}
.day-lbl.today{color:var(--low)}
.day-cnt{font-size:10px;color:var(--dim);font-family:var(--mono)}
.stream-grp{margin:0 12px 8px}
.stream-hdr{display:flex;align-items:center;gap:6px;padding:4px 0 2px}
.pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-family:var(--mono)}
.pip.roobet,  .slbl.roobet  {background:var(--roobet);  color:var(--roobet)}
.pip.lsports, .slbl.lsports {background:var(--lsports); color:var(--lsports)}
.pip.openbet, .slbl.openbet {background:var(--openbet); color:var(--openbet)}
.pip.internal,.slbl.internal{background:var(--internal);color:var(--internal)}
.pip.self,    .slbl.self    {background:var(--self);    color:var(--self)}

/* ── Task card ── */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;position:relative;overflow:hidden;margin-bottom:3px;-webkit-tap-highlight-color:transparent}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.tc.p-critical::before{background:var(--critical)}
.tc.p-high::before   {background:var(--high)}
.tc.p-medium::before {background:var(--medium)}
.tc.p-low::before    {background:var(--low)}
.tc.done-card{opacity:.5}
.tc-row{display:flex;align-items:flex-start;gap:9px}
.chk{width:17px;height:17px;flex-shrink:0;border:1.5px solid var(--muted);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;-webkit-tap-highlight-color:transparent}
.chk.on{background:var(--done);border-color:var(--done)}
.chk.on::after{content:'✓';color:#000;font-size:10px;font-weight:700}
.tc-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.tc-title.done{text-decoration:line-through;color:var(--dim2)}
.tc-meta{display:flex;gap:5px;align-items:center;margin-left:26px;margin-top:4px;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.b-critical{background:rgba(255,59,59,.15);  color:var(--critical)}
.b-high    {background:rgba(255,140,0,.15);  color:var(--high)}
.b-medium  {background:rgba(245,196,0,.15);  color:var(--medium)}
.b-low     {background:rgba(74,158,255,.15); color:var(--low)}
.b-wip     {background:rgba(124,92,252,.15); color:var(--wip)}
.due{font-size:10px;font-family:var(--mono);color:var(--dim2)}
.due.ov{color:var(--critical)}
.due.td{color:var(--high)}

/* ── Meeting cards ── */
.meetings-wrap{padding:10px 12px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mc-hdr{padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;-webkit-tap-highlight-color:transparent}
.mc-hdr:active{opacity:.8}
.mc-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.mc-meta{flex:1;min-width:0}
.mc-title{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:6px}
.mc-sub{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.mc-date{font-size:11px;color:var(--dim2);font-family:var(--mono)}
.mc-ppl{font-size:11px;color:var(--dim2)}
.mc-act-badge{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:99px;background:rgba(74,158,255,.15);color:var(--low)}
.mc-chev{color:var(--dim2);font-size:16px;flex-shrink:0;transition:transform .2s;margin-top:2px}
.mc.open .mc-chev{transform:rotate(90deg)}
.mc-body{display:none;border-top:1px solid var(--border)}
.mc.open .mc-body{display:block}

/* summary block */
.mc-summary{padding:12px 14px;border-bottom:1px solid var(--border)}
.mc-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:8px}
.mc-section-lbl.blue{color:var(--low)}
.mc-section-lbl.grey{color:var(--dim2)}
.mc-summary-text{font-size:13px;color:var(--dim2);line-height:1.6}

/* key points */
.mc-points{padding:12px 14px;border-bottom:1px solid var(--border)}
.mc-point{font-size:13px;color:var(--text);line-height:1.5;padding:4px 0;padding-left:14px;position:relative}
.mc-point::before{content:'·';position:absolute;left:0;color:var(--dim2);font-size:16px;line-height:1.2}

/* actions block */
.mc-actions{padding:10px 14px}
.mc-action-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.mc-action-item:last-child{border-bottom:none}
.mc-chk{width:16px;height:16px;flex-shrink:0;border:1.5px solid var(--muted);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;-webkit-tap-highlight-color:transparent}
.mc-chk.on{background:var(--done);border-color:var(--done)}
.mc-chk.on::after{content:'✓';color:#000;font-size:9px;font-weight:700}
.mc-action-body{flex:1;min-width:0}
.mc-action-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.mc-action-title.done{text-decoration:line-through;color:var(--dim2)}
.mc-action-desc{font-size:12px;color:var(--dim2);line-height:1.5;margin-bottom:5px}
.mc-action-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.mc-action-src{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:5px;font-style:italic;line-height:1.4;border-left:2px solid var(--border);padding-left:8px}

/* ── Empty ── */
.empty{text-align:center;padding:50px 24px;color:var(--dim2)}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(20px + var(--sb));right:20px;width:52px;height:52px;border-radius:50%;background:var(--low);color:#000;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(74,158,255,.3);z-index:200;-webkit-tap-highlight-color:transparent}
#fab:active{transform:scale(.9)}

/* ── Modal ── */
.mb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center}
.mb.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--sb))}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-family:var(--mono)}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--ui);font-size:14px;padding:9px 12px;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--low)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field select{cursor:pointer}
.field select option{background:var(--surface)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}
.dl{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.dl:last-child{border-bottom:none;margin-bottom:0}
.dl-lbl{font-size:10px;font-weight:700;color:var(--dim2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:var(--mono)}
.dl-val{font-size:14px;line-height:1.5}
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.src-box{font-size:12px;color:var(--dim2);font-family:var(--mono);background:var(--bg);border-left:3px solid var(--border);padding:8px 10px;border-radius:0 4px 4px 0;line-height:1.6}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(86px + var(--sb));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 18px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--done);color:var(--done)}
#toast.error  {border-color:var(--critical);color:var(--critical)}
</style>
</head>
<body>

<div id="token-overlay">
  <div class="token-card">
    <h1>Actions</h1>
    <p>Enter your GitHub PAT with Contents read/write on <code>gorilagav/actions</code>.</p>
    <input type="password" id="token-input" placeholder="github_pat_..." autocomplete="off" spellcheck="false">
    <button class="btn btn-primary" onclick="saveToken()">Connect</button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="top-title">Actions</div>
    <button class="icon-btn" id="sync-btn" onclick="syncNow()">⟳</button>
    <button class="btn btn-ghost btn-sm" onclick="openModal('settings-modal')">⚙</button>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain('todo',this)">To-Do</button>
    <button class="main-tab" onclick="switchMain('meetings',this)">Meetings</button>
  </div>

  <!-- TO-DO PANEL -->
  <div class="tab-panel active" id="panel-todo">
    <div class="dash-header">
      <div class="greeting" id="greeting">Good morning.</div>
      <div class="greeting-date" id="greeting-date"></div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-lbl">Outstanding</div>
          <div class="stat-val v-def" id="stat-total">–</div>
          <div class="stat-sub">active actions</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Critical</div>
          <div class="stat-val" id="stat-critical">–</div>
          <div class="stat-sub">need attention now</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--wip)"></div>
          <div class="stat-lbl">Est. to clear</div>
          <div class="stat-val v-def" id="stat-time" style="font-size:20px;margin-bottom:4px">–</div>
          <div class="stat-sub">all tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Done this week</div>
          <div class="stat-val" id="stat-done">–</div>
          <div class="stat-sub">completed</div>
        </div>
      </div>
    </div>

    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSub('active',this)">Active</button>
      <button class="sub-tab" onclick="switchSub('completed',this)">Completed</button>
    </div>

    </div>
    <div class="task-list" id="task-list"></div>
  </div>

  <!-- MEETINGS PANEL -->
  <div class="tab-panel" id="panel-meetings">
    <div class="meetings-wrap" id="meetings-wrap"></div>
  </div>
</div>

<button id="fab" onclick="openAddModal()">＋</button>
<div id="toast"></div>

<!-- Add/Edit modal -->
<div class="mb hidden" id="task-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <h2 id="modal-title">New Action</h2>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Title</label><input type="text" id="f-title" placeholder="Send Q3 figures to Dana" autocapitalize="sentences"></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="What does done look like?"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Priority</label><select id="f-priority"><option value="medium">Medium</option><option value="critical">Critical</option><option value="high">High</option><option value="low">Low</option></select></div>
      <div class="field"><label>Due date</label><input type="date" id="f-due"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Stream</label><select id="f-stream"><option value="">Auto</option><option value="roobet">Roobet</option><option value="lsports">Lsports</option><option value="openbet">Openbet</option><option value="internal">Internal</option><option value="self">Self</option></select></div>
      <div class="field"><label>Assigned by</label><input type="text" id="f-assigned" placeholder="Self"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Est. time</label><input type="text" id="f-time" placeholder="1h 30m"></div>
      <div class="field"><label>Status</label><select id="f-status"><option value="">—</option><option value="wip">In Progress</option></select></div>
    </div>
    <div class="field"><label>People</label><input type="text" id="f-people" placeholder="comma separated"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
    <div style="margin-top:10px;text-align:center">
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="deleteTask()" style="display:none">Delete</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="mb hidden" id="detail-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')">Close</button>
      <button class="btn btn-primary" id="detail-edit-btn">Edit</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="mb hidden" id="settings-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <h2>Settings</h2>
    <div class="field"><label>GitHub PAT</label><input type="password" id="s-token" placeholder="github_pat_..." autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('settings-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateToken()">Save</button>
    </div>
    <div style="margin-top:14px;text-align:center">
      <button class="btn btn-danger btn-sm" onclick="clearToken()">Sign out</button>
    </div>
  </div>
</div>

<script>
const GH_API='https://api.github.com/repos/gorilagav/actions/contents/state.json';
const SALT=new TextEncoder().encode('hmar-v1-salt-2026');

let state={a:[],c:[],m:[]};
let currentSub='active', editingId=null;

// ── Stream ────────────────────────────────────────────────────────────────────
const SRULES=[
  {s:'roobet',  p:/roobet|nick gabriel|betby|jason ayton|vicro|dark aldo|aldemar|jermaine|slotregat|fredo/i},
  {s:'lsports', p:/lsports|tlv|shay|matanelle|matanel|benny|artiom|asaf|yuval|itsik|digim|digi|iku|afun|afan|defend|maayan|netzer|neta/i},
  {s:'openbet', p:/openbet/i},
  {s:'internal',p:/harrison|aaron|viktor|alastair|arena.?360|ccf|cpto/i},
];
function inferStream(t){
  if(t.stream) return t.stream;
  const h=[t.meetingTitle,t.meetingContext,t.people,t.assignedBy,t.title,t.description].filter(Boolean).join(' ');
  for(const{s,p}of SRULES) if(p.test(h)) return s;
  return 'self';
}
function streamCol(s){return{roobet:'var(--roobet)',lsports:'var(--lsports)',openbet:'var(--openbet)',internal:'var(--internal)',self:'var(--self)'}[s]||'var(--self)';}

// ── Crypto ────────────────────────────────────────────────────────────────────
async function deriveKey(pat){
  const raw=await crypto.subtle.importKey('raw',new TextEncoder().encode(pat),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',salt:SALT,iterations:200000},raw,256);
  return crypto.subtle.importKey('raw',bits,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function enc(data,pat){
  const key=await deriveKey(pat),iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  return JSON.stringify({enc:1,v:1,iv:btoa(String.fromCharCode(...iv)),data:btoa(String.fromCharCode(...new Uint8Array(ct)))});
}
async function dec(text,pat){
  const e=JSON.parse(text);if(e.enc!==1)return e;
  const key=await deriveKey(pat);
  const iv=Uint8Array.from(atob(e.iv),c=>c.charCodeAt(0)),ct=Uint8Array.from(atob(e.data),c=>c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct)));
}

// ── Token ─────────────────────────────────────────────────────────────────────
const getToken=()=>localStorage.getItem('gh_token');
function saveToken(){const v=document.getElementById('token-input').value.trim();if(!v)return;localStorage.setItem('gh_token',v);document.getElementById('token-overlay').classList.add('hidden');document.getElementById('app').classList.add('visible');loadState();}
function updateToken(){const v=document.getElementById('s-token').value.trim();if(!v)return;localStorage.setItem('gh_token',v);closeModal('settings-modal');toast('Token updated','success');loadState();}
function clearToken(){if(!confirm('Sign out?'))return;localStorage.removeItem('gh_token');location.reload();}

// ── GitHub ────────────────────────────────────────────────────────────────────
async function ghGet(){
  const token=getToken(),r=await fetch(GH_API,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
  if(r.status===404)return{data:null,sha:null};
  if(!r.ok)throw new Error(`GET ${r.status}`);
  const j=await r.json();
  return{data:await dec(atob(j.content.replace(/\n/g,'')),token),sha:j.sha};
}
async function ghPut(data,sha){
  const token=getToken(),content=btoa(unescape(encodeURIComponent(await enc(data,token)))),body={message:'sync: update state',content};
  if(sha)body.sha=sha;
  const r=await fetch(GH_API,{method:'PUT',headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===409){const{sha:s}=await ghGet();return ghPut(data,s);}
  if(!r.ok)throw new Error(`PUT ${r.status}`);
}

// ── Merge ─────────────────────────────────────────────────────────────────────
function mergeStates(remote,local){
  remote=(remote&&remote.a!=null)?remote:{a:[],c:[],m:[]};
  const byId=arr=>Object.fromEntries((arr||[]).filter(t=>t&&t.id).map(t=>[t.id,t]));
  const ra=byId(remote.a),rc=byId(remote.c),la=byId(local.a),lc=byId(local.c);
  const c={...rc};
  for(const[i,t]of Object.entries(lc))if(!(i in c&&(c[i].completedAt||0)>(t.completedAt||0)))c[i]=t;
  const a={};
  for(const i of new Set([...Object.keys(ra),...Object.keys(la)])){
    const lt=la[i],rt=ra[i];
    let cand=(lt&&rt)?((lt.updatedAt||0)>=(rt.updatedAt||0)?lt:rt):(lt||rt);
    if(i in c){if(Math.max(cand.updatedAt||0,cand.uncompletedAt||0)>(c[i].completedAt||0)){delete c[i];a[i]=cand;}}
    else a[i]=cand;
  }
  function order(p,s,pool){const out=[];pool={...pool};for(const t of[...(p||[]),...(s||[])]){if(t.id in pool){out.push(pool[t.id]);delete pool[t.id];}}out.push(...Object.values(pool));return out;}
  const rmById=Object.fromEntries((remote.m||[]).map(m=>[m.id,m]));
  const lmById=Object.fromEntries((local.m||[]).map(m=>[m.id,m]));
  return{a:order(local.a,remote.a,a),c:order(local.c,remote.c,c),m:Object.values({...rmById,...lmById})};
}

// ── Local storage ─────────────────────────────────────────────────────────────
function readLocal(){try{return{a:JSON.parse(localStorage.getItem('ar6_a')||'[]'),c:JSON.parse(localStorage.getItem('ar6_c')||'[]'),m:JSON.parse(localStorage.getItem('ar6_m')||'[]')};}catch{return{a:[],c:[],m:[]};}}
function writeLocal(s){localStorage.setItem('ar6_a',JSON.stringify(s.a||[]));localStorage.setItem('ar6_c',JSON.stringify(s.c||[]));localStorage.setItem('ar6_m',JSON.stringify(s.m||[]));}

// ── Load/Save ─────────────────────────────────────────────────────────────────
async function loadState(){
  try{const{data:remote}=await ghGet();const local=readLocal();state=remote?mergeStates(remote,local):local;writeLocal(state);render();}
  catch(e){console.error(e);state=readLocal();render();toast('Offline — showing local data','error');}
}
async function saveState(){
  writeLocal(state);
  try{const{sha}=await ghGet();await ghPut(state,sha);}
  catch(e){console.error(e);toast('Saved locally — sync failed','error');}
}
async function syncNow(){
  const btn=document.getElementById('sync-btn');btn.classList.add('spinning');
  try{await loadState();toast('Synced','success');}catch{toast('Sync failed','error');}
  finally{btn.classList.remove('spinning');}
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dayDiff(dd){if(!dd)return null;return Math.round((new Date(dd+'T00:00:00')-today0())/86400000);}
function dayKey(dd){const d=dayDiff(dd);if(d===null)return'none';if(d<0)return'overdue';if(d===0)return'today';if(d===1)return'tomorrow';if(d<=6)return'week';return'later';}
const DAY_ORDER=['overdue','today','tomorrow','week','later','none'];
const DAY_LABEL={overdue:'Overdue',today:'Today',tomorrow:'Tomorrow',week:'This week',later:'Later',none:'No due date'};
const S_ORDER=['roobet','lsports','openbet','internal','self'];
function dueLine(dd){
  const d=dayDiff(dd);if(d===null)return'';
  if(d<0)return`<span class="due ov">${Math.abs(d)}d overdue</span>`;
  if(d===0)return`<span class="due td">Today</span>`;
  if(d===1)return`<span class="due">Tomorrow</span>`;
  return`<span class="due">${dd}</span>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const active=state.a||[];
  const total=active.length,crit=active.filter(t=>t.priority==='critical').length;
  let mins=0;
  for(const t of active){if(t.estimatedMinutes)mins+=t.estimatedMinutes;else if(t.estimatedTime){const hm=t.estimatedTime.match(/(\d+)h/),mm=t.estimatedTime.match(/(\d+)m/);if(hm)mins+=parseInt(hm[1])*60;if(mm)mins+=parseInt(mm[1]);}}
  const ts=mins===0?'—':mins<60?`${mins}m`:`${Math.floor(mins/60)}h${mins%60?` ${mins%60}m`:''}`;
  const weekAgo=Date.now()-7*86400000,doneW=(state.c||[]).filter(t=>(t.completedAt||0)>weekAgo).length;
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<12?'Good morning.':h<17?'Good afternoon.':'Good evening.';
  document.getElementById('greeting-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const st=document.getElementById('stat-total');st.textContent=total;st.className='stat-val '+(total===0?'v-ok':'v-def');
  const sc=document.getElementById('stat-critical');sc.textContent=crit;sc.className='stat-val '+(crit===0?'v-ok':'v-crit');
  document.getElementById('stat-time').textContent=ts;
  const sd=document.getElementById('stat-done');sd.textContent=doneW;sd.className='stat-val '+(doneW>0?'v-ok':'v-def');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){updateStats();renderTodo();renderMeetings();}

function renderTodo(){
  const list=currentSub==='active'?(state.a||[]):(state.c||[]);
  const filtered=list;
  const el=document.getElementById('task-list');
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">${currentSub==='active'?'✓':'📋'}</div><h3>${currentSub==='active'?'All clear':'Nothing completed yet'}</h3><p>${currentSub==='active'?'Tap + to add an action.':'Completed actions appear here.'}</p></div>`;return;}
  const byDay={};
  for(const t of filtered){const dk=dayKey(t.dueDate);if(!byDay[dk])byDay[dk]=[];byDay[dk].push(t);}
  let html='';
  for(const dk of DAY_ORDER){
    if(!byDay[dk])continue;
    const byS={};for(const t of byDay[dk]){const s=inferStream(t);if(!byS[s])byS[s]=[];byS[s].push(t);}
    html+=`<div class="day-group"><div class="day-hdr"><span class="day-lbl${dk==='overdue'?' overdue':dk==='today'?' today':''}">${DAY_LABEL[dk]}</span><span class="day-cnt">${byDay[dk].length}</span></div>`;
    for(const s of S_ORDER){
      if(!byS[s])continue;
      html+=`<div class="stream-grp"><div class="stream-hdr"><span class="pip ${s}"></span><span class="slbl ${s}">${s}</span></div>`;
      for(const t of byS[s]){
        const p=t.priority||'medium',isC=currentSub==='completed';
        html+=`<div class="tc p-${p}${isC?' done-card':''}" onclick="openDetail('${esc(t.id)}')"><div class="tc-row"><div class="chk${isC?' on':''}" onclick="toggleComplete(event,'${esc(t.id)}')"></div><div class="tc-title${isC?' done':''}">${esc(t.title)}</div></div><div class="tc-meta"><span class="bdg b-${p}">${p}</span>${t.status==='wip'?'<span class="bdg b-wip">WIP</span>':''}${dueLine(t.dueDate)}</div></div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function renderMeetings(){
  const el=document.getElementById('meetings-wrap');
  const meetings=[...(state.m||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!meetings.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><h3>No meetings yet</h3><p>Say "pull my actions" to Claude to sync meetings.</p></div>`;return;}
  const all=[...(state.a||[]),...(state.c||[])];
  let html='';
  for(const m of meetings){
    const mTasks=all.filter(t=>t.meetingTitle===m.title&&t.meetingDate===m.date);
    const s=inferStream({meetingTitle:m.title,people:(m.attendees||[]).join(' ')});
    const col=streamCol(s);
    const ppl=(m.attendees||[]).slice(0,3).join(', ')+(m.attendees&&m.attendees.length>3?` +${m.attendees.length-3}`:'');
    html+=`<div class="mc" id="mc-${esc(m.id)}">
      <div class="mc-hdr" onclick="toggleMeeting('${esc(m.id)}')">
        <span class="mc-pip" style="background:${col}"></span>
        <div class="mc-meta">
          <div class="mc-title">${esc(m.title)}</div>
          <div class="mc-sub">
            <span class="mc-date">${m.date||''}</span>
            ${ppl?`<span class="mc-ppl">${esc(ppl)}</span>`:''}
            ${mTasks.length?`<span class="mc-act-badge">${mTasks.length} action${mTasks.length!==1?'s':''}</span>`:''}
          </div>
        </div>
        <span class="mc-chev">›</span>
      </div>
      <div class="mc-body">
        ${m.summary?`<div class="mc-summary">
          <div class="mc-section-lbl grey">Summary</div>
          <div class="mc-summary-text">${esc(m.summary)}</div>
        </div>`:''}
        ${mTasks.length?`<div class="mc-actions">
          <div class="mc-section-lbl blue">Your actions (${mTasks.length})</div>
          ${mTasks.map(t=>{
            const p=t.priority||'medium';
            const isC=(state.c||[]).some(x=>x.id===t.id);
            return`<div class="mc-action-item">
              <div class="mc-chk${isC?' on':''}" onclick="toggleComplete(event,'${esc(t.id)}')"></div>
              <div class="mc-action-body">
                <div class="mc-action-title${isC?' done':''}">${esc(t.title)}</div>
                ${t.description?`<div class="mc-action-desc">${esc(t.description)}</div>`:''}
                <div class="mc-action-meta">
                  <span class="bdg b-${p}">${p}</span>
                  ${t.assignedBy&&t.assignedBy!=='Self'?`<span class="due">↑ ${esc(t.assignedBy)}</span>`:''}
                  ${dueLine(t.dueDate)}
                </div>
                ${t.meetingContext?`<div class="mc-action-src">"${esc(t.meetingContext)}"</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>`:`<div style="padding:12px 14px;font-size:13px;color:var(--dim2)">No actions assigned to you in this meeting.</div>`}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function toggleMeeting(id){document.getElementById('mc-'+id)?.classList.toggle('open');}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(id){
  const all=[...(state.a||[]),...(state.c||[])],t=all.find(x=>x.id===id);if(!t)return;
  const p=t.priority||'medium',s=inferStream(t),isC=(state.c||[]).some(x=>x.id===id);
  document.getElementById('detail-content').innerHTML=`
    <div style="margin-bottom:14px">
      <div class="slbl ${s}" style="margin-bottom:8px">${s}</div>
      <div style="font-size:17px;font-weight:600;line-height:1.4">${esc(t.title)}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
      <span class="bdg b-${p}">${p}</span>
      ${t.status==='wip'?'<span class="bdg b-wip">WIP</span>':''}
      ${t.dueDate?dueLine(t.dueDate):''}
    </div>
    ${t.description?`<div class="dl"><div class="dl-lbl">Done looks like</div><div class="dl-val">${esc(t.description)}</div></div>`:''}
    <div class="dl"><div class="dl-grid">
      <div><div class="dl-lbl">Assigned by</div><div class="dl-val">${esc(t.assignedBy||'Self')}</div></div>
      ${t.estimatedTime?`<div><div class="dl-lbl">Est. time</div><div class="dl-val">${esc(t.estimatedTime)}</div></div>`:''}
      ${t.people?`<div><div class="dl-lbl">People</div><div class="dl-val">${esc(t.people)}</div></div>`:''}
      ${t.meetingTitle?`<div><div class="dl-lbl">Meeting</div><div class="dl-val">${esc(t.meetingTitle)}<br><span style="color:var(--dim2);font-size:12px">${t.meetingDate||''}</span></div></div>`:''}
    </div></div>
    ${t.meetingContext?`<div class="dl"><div class="dl-lbl">Source</div><div class="src-box">${esc(t.meetingContext)}</div></div>`:''}
    ${isC&&t.completedAt?`<div style="font-size:12px;color:var(--dim2)">Completed ${new Date(t.completedAt).toLocaleDateString()}</div>`:''}
  `;
  document.getElementById('detail-edit-btn').onclick=()=>{closeModal('detail-modal');openEditModal(id);};
  openModal('detail-modal');
}

// ── Add/Edit ──────────────────────────────────────────────────────────────────
function openAddModal(){
  editingId=null;document.getElementById('modal-title').textContent='New Action';
  ['edit-id','f-title','f-desc','f-due','f-assigned','f-time','f-people'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-priority').value='medium';document.getElementById('f-stream').value='';document.getElementById('f-status').value='';
  document.getElementById('delete-btn').style.display='none';openModal('task-modal');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}
function openEditModal(id){
  const all=[...(state.a||[]),...(state.c||[])],t=all.find(x=>x.id===id);if(!t)return;
  editingId=id;document.getElementById('modal-title').textContent='Edit Action';
  document.getElementById('edit-id').value=id;document.getElementById('f-title').value=t.title||'';document.getElementById('f-desc').value=t.description||'';
  document.getElementById('f-priority').value=t.priority||'medium';document.getElementById('f-due').value=t.dueDate||'';
  document.getElementById('f-stream').value=t.stream||'';document.getElementById('f-assigned').value=t.assignedBy||'';
  document.getElementById('f-time').value=t.estimatedTime||'';document.getElementById('f-people').value=t.people||'';
  document.getElementById('f-status').value=t.status||'';document.getElementById('delete-btn').style.display='block';
  openModal('task-modal');
}
async function saveTask(){
  const title=document.getElementById('f-title').value.trim();if(!title){toast('Title required','error');return;}
  const now=Date.now(),fields={title,description:document.getElementById('f-desc').value.trim()||undefined,priority:document.getElementById('f-priority').value,dueDate:document.getElementById('f-due').value||undefined,stream:document.getElementById('f-stream').value||undefined,assignedBy:document.getElementById('f-assigned').value.trim()||'Self',estimatedTime:document.getElementById('f-time').value.trim()||undefined,people:document.getElementById('f-people').value.trim()||undefined,status:document.getElementById('f-status').value||undefined,updatedAt:now};
  if(editingId){const idx=(state.a||[]).findIndex(t=>t.id===editingId);if(idx>=0)Object.assign(state.a[idx],fields);}
  else state.a=[{id:`manual-${now}`,addedAt:now,...fields},...(state.a||[])];
  closeModal('task-modal');render();await saveState();toast('Saved','success');
}
async function deleteTask(){
  if(!editingId||!confirm('Delete?'))return;
  state.a=(state.a||[]).filter(t=>t.id!==editingId);state.c=(state.c||[]).filter(t=>t.id!==editingId);
  closeModal('task-modal');render();await saveState();toast('Deleted','success');
}
async function toggleComplete(e,id){
  e.stopPropagation();const now=Date.now();
  const ai=(state.a||[]).findIndex(t=>t.id===id);
  if(ai>=0){const t={...state.a[ai],completedAt:now,updatedAt:now};state.a.splice(ai,1);state.c=[t,...(state.c||[])];}
  else{const ci=(state.c||[]).findIndex(t=>t.id===id);if(ci>=0){const t={...state.c[ci],uncompletedAt:now,updatedAt:now};delete t.completedAt;state.c.splice(ci,1);state.a=[t,...(state.a||[])];}}
  render();await saveState();
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function switchMain(tab,el){
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('fab').style.display=tab==='todo'?'flex':'none';
}
function switchSub(sub,el){currentSub=sub;document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderTodo();}document.querySelectorAll('.mb').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.add('hidden');}));

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2800);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Boot ──────────────────────────────────────────────────────────────────────
(function init(){
  const token=getToken();if(!token)return;
  document.getElementById('token-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadState();
  document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveToken();});
})();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
