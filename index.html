<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Actions">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Actions</title>
<style>
:root {
  --bg:        #0d0d0d;
  --surface:   #161616;
  --surface2:  #1e1e1e;
  --border:    #222;
  --muted:     #444;
  --text:      #e8e8e8;
  --dim:       #555;
  --dim2:      #888;
  --critical:  #ff3b3b;
  --high:      #ff8c00;
  --medium:    #f5c400;
  --low:       #4a9eff;
  --done:      #2ecc71;
  --wip:       #7c5cfc;
  --font-mono: 'SF Mono','Fira Code','Cascadia Code',monospace;
  --font-ui:   -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:    8px;
  --safe-b:    env(safe-area-inset-bottom,0px);
  --safe-t:    env(safe-area-inset-top,0px);
  --s-roobet:   #e84393;
  --s-lsports:  #00c896;
  --s-openbet:  #a78bfa;
  --s-internal: #fb923c;
  --s-self:     #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── Token overlay ── */
#token-overlay{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
#token-overlay.hidden{display:none}
.token-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px}
.token-card h1{font-size:18px;font-weight:600;margin-bottom:6px}
.token-card p{font-size:13px;color:var(--dim2);margin-bottom:20px;line-height:1.5}
.token-card input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:10px 12px;margin-bottom:12px;outline:none}
.token-card input:focus{border-color:var(--low)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-primary{background:var(--low);color:#000;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim2);font-size:13px}
.btn-danger{background:transparent;border:1px solid var(--critical);color:var(--critical);font-size:13px}
.btn-sm{padding:6px 11px;font-size:12px}

/* ── App shell ── */
#app{display:none}
#app.visible{display:flex;flex-direction:column;min-height:100dvh}

/* ── Top bar ── */
.top-bar{display:flex;align-items:center;padding:calc(12px + var(--safe-t)) 16px 0;gap:8px}
.top-title{font-size:16px;font-weight:700;flex:1;letter-spacing:-.2px}
.icon-btn{background:none;border:none;color:var(--dim2);font-size:18px;cursor:pointer;padding:6px;-webkit-tap-highlight-color:transparent;transition:color .2s}
.icon-btn:hover{color:var(--text)}
.icon-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Dashboard header (todo tab) ── */
.dash-header{padding:16px 16px 12px}
.greeting{font-size:26px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.greeting-date{font-size:13px;color:var(--dim2)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);margin-bottom:6px;font-family:var(--font-mono)}
.stat-value{font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;font-family:var(--font-mono)}
.stat-sub{font-size:11px;color:var(--dim2)}
.v-default{color:var(--text)}
.v-ok     {color:var(--done)}
.v-warn   {color:var(--high)}
.v-crit   {color:var(--critical)}
.stat-accent{width:24px;height:2px;border-radius:1px;margin-bottom:6px}

/* ── Main tabs ── */
.main-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;margin-top:4px}
.main-tab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--dim2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.main-tab.active{color:var(--text);border-bottom-color:var(--low)}

/* ── Filter chips ── */
.filter-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--dim2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all .15s;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.chip.active{background:var(--low);border-color:var(--low);color:#000}
.chip.sr.active{color:#fff}
.chip.sr-roobet.active  {background:var(--s-roobet);  border-color:var(--s-roobet)}
.chip.sr-lsports.active {background:var(--s-lsports); border-color:var(--s-lsports);color:#000}
.chip.sr-openbet.active {background:var(--s-openbet); border-color:var(--s-openbet)}
.chip.sr-internal.active{background:var(--s-internal);border-color:var(--s-internal);color:#000}
.chip.sr-self.active    {background:var(--s-self);    border-color:var(--s-self);    color:#000}

/* ── Sub tabs (active/completed inside todo) ── */
.sub-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border)}
.sub-tab{padding:8px 12px;font-size:12px;font-weight:600;color:var(--dim2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent;transition:color .15s,border-color .15s;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.sub-tab.active{color:var(--text);border-bottom-color:var(--dim2)}

/* ── Scrollable content ── */
.tab-content{display:none;flex:1;overflow-y:auto;padding-bottom:calc(80px + var(--safe-b))}
.tab-content.active{display:block}

/* ── Task list ── */
.task-list{padding:6px 0}
.day-group{margin-bottom:2px}
.day-header{padding:10px 16px 3px;display:flex;align-items:baseline;gap:8px}
.day-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);font-family:var(--font-mono)}
.day-label.is-overdue{color:var(--critical)}
.day-label.is-today  {color:var(--low)}
.day-count{font-size:10px;color:var(--dim);font-family:var(--font-mono)}
.stream-group{margin:0 12px 8px}
.stream-header{display:flex;align-items:center;gap:6px;padding:4px 2px 2px}
.stream-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stream-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-family:var(--font-mono)}
.pip-roobet,  .lbl-roobet  {background:var(--s-roobet);  color:var(--s-roobet)}
.pip-lsports, .lbl-lsports {background:var(--s-lsports); color:var(--s-lsports)}
.pip-openbet, .lbl-openbet {background:var(--s-openbet); color:var(--s-openbet)}
.pip-internal,.lbl-internal{background:var(--s-internal);color:var(--s-internal)}
.pip-self,    .lbl-self    {background:var(--s-self);    color:var(--s-self)}

/* ── Task card ── */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;position:relative;overflow:hidden;margin-bottom:3px;-webkit-tap-highlight-color:transparent;transition:border-color .15s}
.task-card:active{opacity:.8}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.task-card.p-critical::before{background:var(--critical)}
.task-card.p-high::before   {background:var(--high)}
.task-card.p-medium::before {background:var(--medium)}
.task-card.p-low::before    {background:var(--low)}
.task-card.completed{opacity:.5}
.card-row{display:flex;align-items:flex-start;gap:9px}
.task-check{width:17px;height:17px;flex-shrink:0;border:1.5px solid var(--muted);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-check.checked{background:var(--done);border-color:var(--done)}
.task-check.checked::after{content:'✓';color:#000;font-size:10px;font-weight:700}
.task-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.task-title.done{text-decoration:line-through;color:var(--dim2)}
.card-badges{display:flex;gap:5px;align-items:center;margin-left:26px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;font-family:var(--font-mono);padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.b-critical{background:rgba(255,59,59,.15);  color:var(--critical)}
.b-high    {background:rgba(255,140,0,.15);  color:var(--high)}
.b-medium  {background:rgba(245,196,0,.15);  color:var(--medium)}
.b-low     {background:rgba(74,158,255,.15); color:var(--low)}
.b-wip     {background:rgba(124,92,252,.15); color:var(--wip)}
.due-tag   {font-size:10px;font-family:var(--font-mono);color:var(--dim2)}
.due-tag.overdue{color:var(--critical)}
.due-tag.today  {color:var(--high)}

/* ── Meeting cards ── */
.meetings-list{padding:10px 12px}
.meeting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.meeting-card-header{padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;-webkit-tap-highlight-color:transparent}
.meeting-card-header:active{opacity:.8}
.meeting-meta{flex:1;min-width:0}
.meeting-title{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:5px}
.meeting-sub{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.meeting-date{font-size:11px;color:var(--dim2);font-family:var(--font-mono)}
.meeting-attendees{font-size:11px;color:var(--dim2)}
.meeting-action-count{font-size:11px;font-weight:700;font-family:var(--font-mono);padding:2px 7px;border-radius:99px;background:rgba(74,158,255,.15);color:var(--low)}
.meeting-chevron{color:var(--dim2);font-size:14px;flex-shrink:0;transition:transform .2s;margin-top:2px}
.meeting-card.open .meeting-chevron{transform:rotate(90deg)}
.meeting-stream-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}

.meeting-body{display:none;border-top:1px solid var(--border)}
.meeting-card.open .meeting-body{display:block}

.meeting-summary{padding:12px 14px;font-size:13px;color:var(--dim2);line-height:1.6;border-bottom:1px solid var(--border);white-space:pre-wrap}
.meeting-summary-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);font-family:var(--font-mono);margin-bottom:6px}

.meeting-actions-section{padding:10px 14px}
.meeting-actions-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--low);font-family:var(--font-mono);margin-bottom:8px}
.meeting-task{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.meeting-task:last-child{border-bottom:none}
.meeting-task-check{width:16px;height:16px;flex-shrink:0;border:1.5px solid var(--muted);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.meeting-task-check.checked{background:var(--done);border-color:var(--done)}
.meeting-task-check.checked::after{content:'✓';color:#000;font-size:9px;font-weight:700}
.meeting-task-body{flex:1;min-width:0}
.meeting-task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px}
.meeting-task-title.done{text-decoration:line-through;color:var(--dim2)}
.meeting-task-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}

/* ── Empty ── */
.empty{text-align:center;padding:60px 24px;color:var(--dim2)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(20px + var(--safe-b));right:20px;width:52px;height:52px;border-radius:50%;background:var(--low);color:#000;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(74,158,255,.3);z-index:200;-webkit-tap-highlight-color:transparent;transition:transform .15s}
#fab:active{transform:scale(.9)}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center}
.modal-backdrop.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-b))}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-family:var(--font-mono)}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:9px 12px;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--low)}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field select{cursor:pointer}
.field select option{background:var(--surface)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}
.detail-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.detail-section:last-child{border-bottom:none;margin-bottom:0}
.detail-label{font-size:10px;font-weight:700;color:var(--dim2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:var(--font-mono)}
.detail-value{font-size:14px;line-height:1.5}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.meeting-context-box{font-size:12px;color:var(--dim2);font-family:var(--font-mono);background:var(--bg);border-left:3px solid var(--border);padding:8px 10px;border-radius:0 4px 4px 0;line-height:1.6}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(86px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--done);color:var(--done)}
#toast.error  {border-color:var(--critical);color:var(--critical)}
</style>
</head>
<body>

<div id="token-overlay">
  <div class="token-card">
    <h1>Actions</h1>
    <p>Enter your GitHub fine-grained PAT with Contents read/write on <code>gorilagav/actions</code>.</p>
    <input type="password" id="token-input" placeholder="github_pat_..." autocomplete="off" spellcheck="false">
    <button class="btn btn-primary" onclick="saveToken()">Connect</button>
  </div>
</div>

<div id="app">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-title">Actions</div>
    <button class="icon-btn" id="sync-btn" onclick="syncNow()">⟳</button>
    <button class="btn btn-ghost btn-sm" onclick="showSettings()">⚙</button>
  </div>

  <!-- Main tabs -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain('todo',this)">To-Do</button>
    <button class="main-tab" onclick="switchMain('meetings',this)">Meetings</button>
  </div>

  <!-- ── TO-DO TAB ── -->
  <div class="tab-content active" id="tab-todo">
    <div class="dash-header">
      <div class="greeting" id="greeting">Good morning.</div>
      <div class="greeting-date" id="greeting-date"></div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Outstanding</div>
          <div class="stat-value v-default" id="stat-total">–</div>
          <div class="stat-sub">active actions</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Critical</div>
          <div class="stat-value" id="stat-critical">–</div>
          <div class="stat-sub">need attention now</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--wip)"></div>
          <div class="stat-label">Est. to clear</div>
          <div class="stat-value v-default" id="stat-time" style="font-size:20px;margin-bottom:4px">–</div>
          <div class="stat-sub">all tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Done this week</div>
          <div class="stat-value" id="stat-done">–</div>
          <div class="stat-sub">completed</div>
        </div>
      </div>
    </div>

    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSub('active',this)">Active</button>
      <button class="sub-tab" onclick="switchSub('completed',this)">Completed</button>
    </div>

    <div class="filter-row">
      <button class="chip active" data-f="all" onclick="setFilter('all',this)">All</button>
      <button class="chip sr sr-roobet"   data-f="roobet"   onclick="setFilter('roobet',this)">Roobet</button>
      <button class="chip sr sr-lsports"  data-f="lsports"  onclick="setFilter('lsports',this)">Lsports</button>
      <button class="chip sr sr-openbet"  data-f="openbet"  onclick="setFilter('openbet',this)">Openbet</button>
      <button class="chip sr sr-internal" data-f="internal" onclick="setFilter('internal',this)">Internal</button>
      <button class="chip sr sr-self"     data-f="self"     onclick="setFilter('self',this)">Self</button>
    </div>

    <div class="task-list" id="task-list"></div>
  </div>

  <!-- ── MEETINGS TAB ── -->
  <div class="tab-content" id="tab-meetings">
    <div class="meetings-list" id="meetings-list"></div>
  </div>
</div>

<button id="fab" onclick="openAddModal()">＋</button>
<div id="toast"></div>

<!-- Add/Edit modal -->
<div class="modal-backdrop hidden" id="task-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">New Action</h2>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Title</label><input type="text" id="f-title" placeholder="Send Q3 figures to Dana" autocapitalize="sentences"></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="What does done look like?"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Priority</label><select id="f-priority"><option value="medium">Medium</option><option value="critical">Critical</option><option value="high">High</option><option value="low">Low</option></select></div>
      <div class="field"><label>Due date</label><input type="date" id="f-due"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Stream</label><select id="f-stream"><option value="">Auto-detect</option><option value="roobet">Roobet</option><option value="lsports">Lsports</option><option value="openbet">Openbet</option><option value="internal">Internal</option><option value="self">Self</option></select></div>
      <div class="field"><label>Assigned by</label><input type="text" id="f-assigned" placeholder="Self"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Est. time</label><input type="text" id="f-time" placeholder="1h 30m"></div>
      <div class="field"><label>Status</label><select id="f-status"><option value="">—</option><option value="wip">In Progress</option></select></div>
    </div>
    <div class="field"><label>People</label><input type="text" id="f-people" placeholder="comma separated"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
    <div style="margin-top:10px;text-align:center">
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="deleteTask()" style="display:none">Delete</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-backdrop hidden" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')">Close</button>
      <button class="btn btn-primary" id="detail-edit-btn">Edit</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop hidden" id="settings-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Settings</h2>
    <div class="field"><label>GitHub PAT</label><input type="password" id="s-token" placeholder="github_pat_..." autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('settings-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateToken()">Save</button>
    </div>
    <div style="margin-top:14px;text-align:center">
      <button class="btn btn-danger btn-sm" onclick="clearToken()">Sign out</button>
    </div>
  </div>
</div>

<script>
const GH_REPO='gorilagav/actions';
const GH_API =`https://api.github.com/repos/${GH_REPO}/contents/state.json`;
const SALT   =new TextEncoder().encode('hmar-v1-salt-2026');

// state.a = active tasks, state.c = completed tasks, state.m = meeting summaries
let state={a:[],c:[],m:[]};
let currentSub='active';
let currentFilter='all';
let editingId=null;

// ── Stream inference ──────────────────────────────────────────────────────────
const SRULES=[
  {s:'roobet',  p:/roobet/i},
  {s:'lsports', p:/lsports|tlv|shay|matanelle|matanel|benny|artiom|asaf|yuval|itsik|digim|digi|iku|afun|afan|defend/i},
  {s:'openbet', p:/openbet/i},
  {s:'internal',p:/harrison|aaron|neta|maayan|viktor|alastair|arena.?360|ccf|cpto|flash.daily/i},
];
function inferStream(t){
  if(t.stream) return t.stream;
  const h=[t.meetingTitle,t.meetingContext,t.people,t.assignedBy,t.title,t.description].filter(Boolean).join(' ');
  for(const{s,p}of SRULES) if(p.test(h)) return s;
  return 'self';
}
function streamColor(s){
  return{roobet:'var(--s-roobet)',lsports:'var(--s-lsports)',openbet:'var(--s-openbet)',internal:'var(--s-internal)',self:'var(--s-self)'}[s]||'var(--s-self)';
}

// ── Crypto ────────────────────────────────────────────────────────────────────
async function deriveKey(pat){
  const raw=await crypto.subtle.importKey('raw',new TextEncoder().encode(pat),'PBKDF2',false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',salt:SALT,iterations:200000},raw,256);
  return crypto.subtle.importKey('raw',bits,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function encryptState(data,pat){
  const key=await deriveKey(pat);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));
  return JSON.stringify({enc:1,v:1,iv:btoa(String.fromCharCode(...iv)),data:btoa(String.fromCharCode(...new Uint8Array(ct)))});
}
async function decryptState(text,pat){
  const env=JSON.parse(text);
  if(env.enc!==1) return env;
  const key=await deriveKey(pat);
  const iv =Uint8Array.from(atob(env.iv),  c=>c.charCodeAt(0));
  const ct =Uint8Array.from(atob(env.data),c=>c.charCodeAt(0));
  const pt =await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

// ── Token ─────────────────────────────────────────────────────────────────────
function getToken(){return localStorage.getItem('gh_token');}
function saveToken(){
  const v=document.getElementById('token-input').value.trim();
  if(!v) return;
  localStorage.setItem('gh_token',v);
  document.getElementById('token-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadState();
}
function updateToken(){
  const v=document.getElementById('s-token').value.trim();
  if(!v) return;
  localStorage.setItem('gh_token',v);
  closeModal('settings-modal');
  toast('Token updated','success');
  loadState();
}
function clearToken(){if(!confirm('Sign out?'))return;localStorage.removeItem('gh_token');location.reload();}
function showSettings(){openModal('settings-modal');}

// ── GitHub ────────────────────────────────────────────────────────────────────
async function ghGet(){
  const token=getToken();
  const r=await fetch(GH_API,{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});
  if(r.status===404) return{data:null,sha:null};
  if(!r.ok) throw new Error(`GET ${r.status}`);
  const j=await r.json();
  return{data:await decryptState(atob(j.content.replace(/\n/g,'')),token),sha:j.sha};
}
async function ghPut(data,sha){
  const token=getToken();
  const enc=await encryptState(data,token);
  const content=btoa(unescape(encodeURIComponent(enc)));
  const body={message:'sync: update state',content};
  if(sha) body.sha=sha;
  const r=await fetch(GH_API,{method:'PUT',headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===409){const{sha:s}=await ghGet();return ghPut(data,s);}
  if(!r.ok) throw new Error(`PUT ${r.status}`);
}

// ── Merge ─────────────────────────────────────────────────────────────────────
function mergeStates(remote,local){
  remote=(remote&&remote.a!=null)?remote:{a:[],c:[],m:[]};
  const byId=arr=>Object.fromEntries((arr||[]).filter(t=>t&&t.id).map(t=>[t.id,t]));
  const ra=byId(remote.a),rc=byId(remote.c),la=byId(local.a),lc=byId(local.c);
  const c={...rc};
  for(const[i,t]of Object.entries(lc)){if(!(i in c&&(c[i].completedAt||0)>(t.completedAt||0)))c[i]=t;}
  const a={};
  for(const i of new Set([...Object.keys(ra),...Object.keys(la)])){
    const lt=la[i],rt=ra[i];
    let cand=(lt&&rt)?((lt.updatedAt||0)>=(rt.updatedAt||0)?lt:rt):(lt||rt);
    if(i in c){if(Math.max(cand.updatedAt||0,cand.uncompletedAt||0)>(c[i].completedAt||0)){delete c[i];a[i]=cand;}}
    else a[i]=cand;
  }
  function order(p,s,pool){const out=[];pool={...pool};for(const t of[...(p||[]),...(s||[])]){if(t.id in pool){out.push(pool[t.id]);delete pool[t.id];}}out.push(...Object.values(pool));return out;}
  // Merge meeting summaries by id
  const rmById=Object.fromEntries((remote.m||[]).map(m=>[m.id,m]));
  const lmById=Object.fromEntries((local.m||[]).map(m=>[m.id,m]));
  const mergedM=Object.values({...rmById,...lmById});
  return{a:order(local.a,remote.a,a),c:order(local.c,remote.c,c),m:mergedM};
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
function readLocal(){
  try{return{a:JSON.parse(localStorage.getItem('ar6_a')||'[]'),c:JSON.parse(localStorage.getItem('ar6_c')||'[]'),m:JSON.parse(localStorage.getItem('ar6_m')||'[]')};}
  catch{return{a:[],c:[],m:[]};}
}
function writeLocal(s){
  localStorage.setItem('ar6_a',JSON.stringify(s.a||[]));
  localStorage.setItem('ar6_c',JSON.stringify(s.c||[]));
  localStorage.setItem('ar6_m',JSON.stringify(s.m||[]));
}

// ── Load / Save ───────────────────────────────────────────────────────────────
async function loadState(){
  try{
    const{data:remote,sha}=await ghGet();
    const local=readLocal();
    state=remote?mergeStates(remote,local):local;
    writeLocal(state);render();
  }catch(e){
    console.error(e);state=readLocal();render();
    toast('Offline — showing local data','error');
  }
}
async function saveState(){
  writeLocal(state);
  try{const{sha}=await ghGet();await ghPut(state,sha);}
  catch(e){console.error(e);toast('Saved locally — sync failed','error');}
}
async function syncNow(){
  const btn=document.getElementById('sync-btn');
  btn.classList.add('spinning');
  try{await loadState();toast('Synced','success');}
  catch{toast('Sync failed','error');}
  finally{btn.classList.remove('spinning');}
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dayDiff(dd){if(!dd)return null;return Math.round((new Date(dd+'T00:00:00')-today0())/86400000);}
function dayKey(dd){const d=dayDiff(dd);if(d===null)return'none';if(d<0)return'overdue';if(d===0)return'today';if(d===1)return'tomorrow';if(d<=6)return'week';return'later';}
const DAY_ORDER=['overdue','today','tomorrow','week','later','none'];
const DAY_LABEL={overdue:'Overdue',today:'Today',tomorrow:'Tomorrow',week:'This week',later:'Later',none:'No due date'};
const STREAM_ORDER=['roobet','lsports','openbet','internal','self'];
function dueLine(dd){
  const d=dayDiff(dd);if(d===null)return'';
  if(d<0)  return`<span class="due-tag overdue">${Math.abs(d)}d overdue</span>`;
  if(d===0)return`<span class="due-tag today">Today</span>`;
  if(d===1)return`<span class="due-tag">Tomorrow</span>`;
  return`<span class="due-tag">${dd}</span>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const active=state.a||[];
  const total=active.length;
  const crit=active.filter(t=>t.priority==='critical').length;
  let mins=0;
  for(const t of active){
    if(t.estimatedMinutes) mins+=t.estimatedMinutes;
    else if(t.estimatedTime){const hm=t.estimatedTime.match(/(\d+)h/),mm=t.estimatedTime.match(/(\d+)m/);if(hm)mins+=parseInt(hm[1])*60;if(mm)mins+=parseInt(mm[1]);}
  }
  const timeStr=mins===0?'—':mins<60?`${mins}m`:`${Math.floor(mins/60)}h${mins%60?` ${mins%60}m`:''}`;
  const weekAgo=Date.now()-7*86400000;
  const doneWeek=(state.c||[]).filter(t=>(t.completedAt||0)>weekAgo).length;
  const h=new Date().getHours();
  document.getElementById('greeting').textContent=h<12?'Good morning.':h<17?'Good afternoon.':'Good evening.';
  document.getElementById('greeting-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-total').className='stat-value '+(total===0?'v-ok':'v-default');
  const scEl=document.getElementById('stat-critical');
  scEl.textContent=crit;scEl.className='stat-value '+(crit===0?'v-ok':'v-crit');
  document.getElementById('stat-time').textContent=timeStr;
  const sdEl=document.getElementById('stat-done');
  sdEl.textContent=doneWeek;sdEl.className='stat-value '+(doneWeek>0?'v-ok':'v-default');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  updateStats();
  renderTodo();
  renderMeetings();
}

function renderTodo(){
  const list=currentSub==='active'?(state.a||[]):(state.c||[]);
  const filtered=currentFilter==='all'?list:list.filter(t=>inferStream(t)===currentFilter);
  const el=document.getElementById('task-list');
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">${currentSub==='active'?'✓':'📋'}</div><h3>${currentSub==='active'?'All clear':'Nothing completed yet'}</h3><p>${currentSub==='active'?'Tap + to add an action.':'Completed actions appear here.'}</p></div>`;
    return;
  }
  const byDay={};
  for(const t of filtered){const dk=dayKey(t.dueDate);if(!byDay[dk])byDay[dk]=[];byDay[dk].push(t);}
  let html='';
  for(const dk of DAY_ORDER){
    if(!byDay[dk]) continue;
    const byStream={};
    for(const t of byDay[dk]){const s=inferStream(t);if(!byStream[s])byStream[s]=[];byStream[s].push(t);}
    html+=`<div class="day-group"><div class="day-header"><span class="day-label${dk==='overdue'?' is-overdue':dk==='today'?' is-today':''}">${DAY_LABEL[dk]}</span><span class="day-count">${byDay[dk].length}</span></div>`;
    for(const s of STREAM_ORDER){
      if(!byStream[s]) continue;
      html+=`<div class="stream-group"><div class="stream-header"><span class="stream-pip pip-${s}"></span><span class="stream-lbl lbl-${s}">${s}</span></div>`;
      for(const t of byStream[s]){
        const p=t.priority||'medium';
        const isComp=currentSub==='completed';
        html+=`<div class="task-card p-${p}${isComp?' completed':''}" onclick="openDetail('${esc(t.id)}')">
          <div class="card-row">
            <div class="task-check${isComp?' checked':''}" onclick="toggleComplete(event,'${esc(t.id)}')"></div>
            <div class="task-title${isComp?' done':''}">${esc(t.title)}</div>
          </div>
          <div class="card-badges"><span class="badge b-${p}">${p}</span>${t.status==='wip'?'<span class="badge b-wip">WIP</span>':''}${dueLine(t.dueDate)}</div>
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function renderMeetings(){
  const el=document.getElementById('meetings-list');
  const meetings=state.m||[];
  if(!meetings.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><h3>No meetings yet</h3><p>Say "pull my actions" to Claude to sync your meetings.</p></div>`;
    return;
  }
  // Sort newest first
  const sorted=[...meetings].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  let html='';
  for(const m of sorted){
    const mTasks=[...(state.a||[]),...(state.c||[])].filter(t=>t.meetingTitle===m.title&&t.meetingDate===m.date);
    const stream=inferStream({meetingTitle:m.title,people:(m.attendees||[]).join(' ')});
    const col=streamColor(stream);
    const attendeeStr=(m.attendees||[]).slice(0,4).join(', ')+(m.attendees&&m.attendees.length>4?` +${m.attendees.length-4}`:'');
    html+=`<div class="meeting-card" id="mc-${esc(m.id)}">
      <div class="meeting-card-header" onclick="toggleMeeting('${esc(m.id)}')">
        <span class="meeting-stream-pip" style="background:${col}"></span>
        <div class="meeting-meta">
          <div class="meeting-title">${esc(m.title)}</div>
          <div class="meeting-sub">
            <span class="meeting-date">${m.date||''}</span>
            ${attendeeStr?`<span class="meeting-attendees">${esc(attendeeStr)}</span>`:''}
            ${mTasks.length?`<span class="meeting-action-count">${mTasks.length} action${mTasks.length!==1?'s':''}</span>`:''}
          </div>
        </div>
        <span class="meeting-chevron">›</span>
      </div>
      <div class="meeting-body">
        ${m.summary?`<div class="meeting-summary"><div class="meeting-summary-label">Summary</div>${esc(m.summary)}</div>`:''}
        ${mTasks.length?`<div class="meeting-actions-section">
          <div class="meeting-actions-label">Your actions</div>
          ${mTasks.map(t=>{
            const p=t.priority||'medium';
            const isComp=(state.c||[]).some(x=>x.id===t.id);
            return`<div class="meeting-task">
              <div class="meeting-task-check${isComp?' checked':''}" onclick="toggleComplete(event,'${esc(t.id)}')"></div>
              <div class="meeting-task-body">
                <div class="meeting-task-title${isComp?' done':''}">${esc(t.title)}</div>
                <div class="meeting-task-meta"><span class="badge b-${p}">${p}</span>${dueLine(t.dueDate)}</div>
              </div>
            </div>`;
          }).join('')}
        </div>`:''}
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function toggleMeeting(id){
  const card=document.getElementById('mc-'+id);
  if(card) card.classList.toggle('open');
}

// ── Detail ────────────────────────────────────────────────────────────────────
function openDetail(id){
  const all=[...(state.a||[]),...(state.c||[])];
  const t=all.find(x=>x.id===id);
  if(!t) return;
  const p=t.priority||'medium';
  const s=inferStream(t);
  const isComp=(state.c||[]).some(x=>x.id===id);
  document.getElementById('detail-content').innerHTML=`
    <div style="margin-bottom:14px">
      <div class="stream-lbl lbl-${s}" style="margin-bottom:8px">${s}</div>
      <div style="font-size:17px;font-weight:600;line-height:1.4">${esc(t.title)}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
      <span class="badge b-${p}">${p}</span>
      ${t.status==='wip'?'<span class="badge b-wip">WIP</span>':''}
      ${t.dueDate?dueLine(t.dueDate):''}
    </div>
    ${t.description?`<div class="detail-section"><div class="detail-label">Done looks like</div><div class="detail-value">${esc(t.description)}</div></div>`:''}
    <div class="detail-section"><div class="detail-grid">
      <div><div class="detail-label">Assigned by</div><div class="detail-value">${esc(t.assignedBy||'Self')}</div></div>
      ${t.estimatedTime?`<div><div class="detail-label">Est. time</div><div class="detail-value">${esc(t.estimatedTime)}</div></div>`:''}
      ${t.people?`<div><div class="detail-label">People</div><div class="detail-value">${esc(t.people)}</div></div>`:''}
      ${t.meetingTitle?`<div><div class="detail-label">Meeting</div><div class="detail-value">${esc(t.meetingTitle)}<br><span style="color:var(--dim2);font-size:12px">${t.meetingDate||''}</span></div></div>`:''}
    </div></div>
    ${t.meetingContext?`<div class="detail-section"><div class="detail-label">Source</div><div class="meeting-context-box">${esc(t.meetingContext)}</div></div>`:''}
    ${isComp&&t.completedAt?`<div style="font-size:12px;color:var(--dim2)">Completed ${new Date(t.completedAt).toLocaleDateString()}</div>`:''}
  `;
  document.getElementById('detail-edit-btn').onclick=()=>{closeModal('detail-modal');openEditModal(id);};
  openModal('detail-modal');
}

// ── Add / Edit ────────────────────────────────────────────────────────────────
function openAddModal(){
  editingId=null;
  document.getElementById('modal-title').textContent='New Action';
  ['edit-id','f-title','f-desc','f-due','f-assigned','f-time','f-people'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-priority').value='medium';
  document.getElementById('f-stream').value='';
  document.getElementById('f-status').value='';
  document.getElementById('delete-btn').style.display='none';
  openModal('task-modal');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}
function openEditModal(id){
  const all=[...(state.a||[]),...(state.c||[])];
  const t=all.find(x=>x.id===id);
  if(!t) return;
  editingId=id;
  document.getElementById('modal-title').textContent='Edit Action';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-title').value=t.title||'';
  document.getElementById('f-desc').value=t.description||'';
  document.getElementById('f-priority').value=t.priority||'medium';
  document.getElementById('f-due').value=t.dueDate||'';
  document.getElementById('f-stream').value=t.stream||'';
  document.getElementById('f-assigned').value=t.assignedBy||'';
  document.getElementById('f-time').value=t.estimatedTime||'';
  document.getElementById('f-people').value=t.people||'';
  document.getElementById('f-status').value=t.status||'';
  document.getElementById('delete-btn').style.display='block';
  openModal('task-modal');
}
async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('Title required','error');return;}
  const now=Date.now();
  const fields={title,description:document.getElementById('f-desc').value.trim()||undefined,priority:document.getElementById('f-priority').value,dueDate:document.getElementById('f-due').value||undefined,stream:document.getElementById('f-stream').value||undefined,assignedBy:document.getElementById('f-assigned').value.trim()||'Self',estimatedTime:document.getElementById('f-time').value.trim()||undefined,people:document.getElementById('f-people').value.trim()||undefined,status:document.getElementById('f-status').value||undefined,updatedAt:now};
  if(editingId){
    const idx=(state.a||[]).findIndex(t=>t.id===editingId);
    if(idx>=0) Object.assign(state.a[idx],fields);
  } else {
    state.a=[{id:`manual-${now}`,addedAt:now,...fields},...(state.a||[])];
  }
  closeModal('task-modal');render();await saveState();toast('Saved','success');
}
async function deleteTask(){
  if(!editingId||!confirm('Delete this action?')) return;
  state.a=(state.a||[]).filter(t=>t.id!==editingId);
  state.c=(state.c||[]).filter(t=>t.id!==editingId);
  closeModal('task-modal');render();await saveState();toast('Deleted','success');
}

// ── Complete ──────────────────────────────────────────────────────────────────
async function toggleComplete(e,id){
  e.stopPropagation();
  const now=Date.now();
  const aIdx=(state.a||[]).findIndex(t=>t.id===id);
  if(aIdx>=0){
    const t={...state.a[aIdx],completedAt:now,updatedAt:now};
    state.a.splice(aIdx,1);state.c=[t,...(state.c||[])];
  } else {
    const cIdx=(state.c||[]).findIndex(t=>t.id===id);
    if(cIdx>=0){
      const t={...state.c[cIdx],uncompletedAt:now,updatedAt:now};
      delete t.completedAt;state.c.splice(cIdx,1);state.a=[t,...(state.a||[])];
    }
  }
  render();await saveState();
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function switchMain(tab,el){
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('fab').style.display=tab==='todo'?'flex':'none';
}
function switchSub(sub,el){
  currentSub=sub;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTodo();
}
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTodo();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(id) {document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.add('hidden');});
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2800);
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Boot ──────────────────────────────────────────────────────────────────────
(function init(){
  const token=getToken();
  if(!token) return;
  document.getElementById('token-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadState();
  document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveToken();});
})();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
